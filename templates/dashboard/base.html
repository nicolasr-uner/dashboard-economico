<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard Economico{% endblock %} | Pactora CLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#0f1117',
                            800: '#1a1d27',
                            700: '#252836',
                            600: '#343748',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f1117; }
        .nav-link { transition: color 0.2s; }
        .badge-transitorio { background: #fbbf24; color: #1a1d27; }
        .badge-estructural { background: #ef4444; color: white; }
        .badge-indeterminado { background: #6b7280; color: white; }
        .chart-container { position: relative; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1d27; }
        ::-webkit-scrollbar-thumb { background: #343748; border-radius: 3px; }
    </style>
</head>
<body class="dark bg-gray-900 text-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">&#x1F4CA;</span>
                    <span class="font-bold text-lg text-white">Dashboard Economico</span>
                    <span class="text-xs text-gray-400 hidden sm:block">Latinoamerica</span>
                </div>
                <div class="flex space-x-1">
                    <a href="/" class="nav-link px-4 py-2 rounded-lg text-sm font-medium {% if request.path == '/' %}text-white bg-gray-700{% else %}text-gray-400 hover:text-white hover:bg-gray-700{% endif %}">
                        Inicio
                    </a>
                    <a href="/paises/" class="nav-link px-4 py-2 rounded-lg text-sm font-medium {% if request.path == '/paises/' %}text-white bg-gray-700{% else %}text-gray-400 hover:text-white hover:bg-gray-700{% endif %}">
                        Paises
                    </a>
                    <a href="/configuracion/" class="nav-link px-4 py-2 rounded-lg text-sm font-medium {% if request.path == '/configuracion/' %}text-white bg-gray-700{% else %}text-gray-400 hover:text-white hover:bg-gray-700{% endif %}">
                        Configuracion
                    </a>
                    <a href="/admin/" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-700">
                        Admin
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
        {% for message in messages %}
        <div class="p-3 rounded-lg mb-2 {% if message.tags == 'success' %}bg-green-900 border border-green-700 text-green-300{% else %}bg-red-900 border border-red-700 text-red-300{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-700 mt-12 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            Dashboard Economico Latinoamerica &middot; Datos actualizados automaticamente
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
